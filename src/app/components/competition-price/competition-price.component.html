<div class="container">
  <h2>{{ 'competition.title' | translate }}</h2>
  <p class="subtitle">{{ 'competition.subtitle' | translate }}</p>
  
  <div class="price-input-container">
    <label class="input-label">
      <span class="currency">€</span>
      <input 
        type="number" 
        [(ngModel)]="competitionPrice"
        (change)="onPriceChange(competitionPrice)"
        min="0" 
        max="10000" 
        step="50"
        class="price-input"
        placeholder="0"
      >
    </label>
    <p class="helper-text">{{ 'competition.helper' | translate }}</p>
  </div>

  <div class="error-message" *ngIf="errorMessage">
    {{ errorMessage | translate }}
  </div>

  <div class="navigation-buttons">
    <button class="btn-back" (click)="onBack()">
      ← {{ 'buttons.back' | translate }}
    </button>
    <button class="btn-next" (click)="onNext()">
      {{ 'buttons.next' | translate }}
    </button>
  </div>
</div>

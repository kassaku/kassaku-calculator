<div class="app-container">
  <header>
    <h1>{{ title }}</h1>
    <p>Compare renting vs buying - Find your perfect POS solution</p>
    <div class="step-indicator" *ngIf="step <= 5">
      Step {{ step }} of 5
    </div>
  </header>
  
  <main>
    <!-- Step 1: Business Type -->
    <app-business-type-selection 
      *ngIf="step === 1"
      (selectionChanged)="onBusinessTypeSelected($event)"
      (next)="onNext()"
    ></app-business-type-selection>

    <!-- Step 2: Competition Price -->
    <app-competition-price 
      *ngIf="step === 2"
      (priceChanged)="onCompetitionPriceChanged($event)"
      (next)="onNext()"
      (back)="onBack()"
    ></app-competition-price>

    <!-- Step 3: Hardware Configuration -->
    <app-hardware-config 
      *ngIf="step === 3"
      [businessType]="selectedBusinessType"
      (configChanged)="onHardwareConfigChanged($event)"
      (next)="onNext()"
      (back)="onBack()"
    ></app-hardware-config>

    <!-- Step 4: Duration & Email -->
    <app-duration-email 
      *ngIf="step === 4"
      [usageMonths]="durationEmailConfig.usageMonths"
      [email]="durationEmailConfig.email"
      [newsletterOptIn]="durationEmailConfig.newsletterOptIn"
      [businessTypeName]="getBusinessTypeName()"
      [competitionPrice]="competitionPrice"
      [hardwareSummary]="getHardwareSummary()"
      (configChanged)="onDurationEmailChanged($event)"
      (next)="onNext()"
      (back)="onBack()"
    ></app-duration-email>

    <!-- Step 5: Results -->
    <app-results 
      *ngIf="step === 5"
      [businessType]="getBusinessTypeName()"
      [competitionPrice]="competitionPrice"
      [hardwareConfig]="hardwareConfig"
      [usageMonths]="durationEmailConfig.usageMonths"
      (back)="onBack()"
      (restart)="onRestart()"
    ></app-results>
  </main>
</div>
